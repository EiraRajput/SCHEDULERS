name: SOCIAL MEDIA COMBINED

on:
  workflow_dispatch:
  # schedule:
    # - cron: '0 11 * * *'   # Runs at 4:30 PM IST
    # - cron: '0 15 * * *'   # Runs at 8:30 PM IST

jobs:
  update-counter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      video_number: ${{ steps.increment.outputs.video_number }}
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: EiraRajput/SOCIAL_MEDIA
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            counter_video.py
            counter_video.txt
          fetch-depth: 1

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      # Install the necessary packages
      - name: Installed package list
        run: apt list --installed

      # Run your Python script and expose the updated counter
      - name: Increment Counter
        id: increment
        run: |
          python3 counter_video.py
          VIDEO_NUMBER=$(cat counter_video.txt)
          echo "video_number=$VIDEO_NUMBER" >> $GITHUB_OUTPUT
          echo "Updated counter_video.txt to: $VIDEO_NUMBER"

      # Check if counter_video.txt has been modified, pull, and push the modified changes.
      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add counter_video.txt
          git commit -m "Update counter_video.txt after processing" || echo "No changes to commit"
          git pull --rebase origin main || echo "No changes to pull"
          git push || echo "No changes to push"

  instagram-reel:
    needs: update-counter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: EiraRajput/SOCIAL_MEDIA
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            AI_MODELS/
            INSTAGRAM/
            counter_video.txt
            requirements.txt
          fetch-depth: 1

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      # Install the necessary packages
      - name: Installed package list
        run: apt list --installed

      # Install dependencies
      - name: Install dependencies
        run: |
         python3 -m pip install --upgrade pip
         pip3 install -r requirements.txt

      # Run your Python script
      - name: Run Python script
        run: python3 INSTAGRAM/instagram_reel.py

  threads-video:
