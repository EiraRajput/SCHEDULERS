name: TELEGRAM COMBINED

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'   # Runs at 1:00 PM IST
    # - cron: '30 9 * * *'  # Runs at 3:00 PM IST
  
jobs:
  telegram-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: EiraRajput/SOCIAL_MEDIA
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            COUNTER/
            TELEGRAM/
            requirements.txt
          fetch-depth: 1

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      # Install the necessary packages
      - name: Installed package list
        run: apt list --installed

      # Install dependencies
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # Run your Python script
      - name: Run Telegram Image Script
        run: python3 TELEGRAM/telegram_image.py

  telegram-text:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: EiraRajput/SOCIAL_MEDIA
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            AI_MODELS/
            TELEGRAM/
            requirements.txt
          fetch-depth: 1

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      # Install the necessary packages
      - name: Installed package list
        run: apt list --installed

      # Install dependencies
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      # Run your Python script
      - name: Run Telegram Text Script
        run: python3 TELEGRAM/telegram_text.py
